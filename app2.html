    body { display: flex; flex-direction: column; }

    /* ── Nav overrides for dark background ─────────────── */
    .nav .btn-icon { color: #fff; }
    .nav .btn-icon:hover { background: rgba(255,255,255,0.15); }

    /* ── Nav search bar ─────────────────────────────── */
    #nav-search-bar { display: none; flex: 1; }
    #nav-search-bar.open { display: flex; align-items: center; gap: var(--space-1); }
    #search-input {
      flex: 1; padding: var(--space-1) var(--space-2);
      border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.4);
      font-size: var(--text-sm); background: rgba(255,255,255,0.15); color: #fff;

    .scope-chip {
      padding: var(--space-1) var(--space-2); border-radius: var(--radius-full);
      font-size: var(--text-xs); cursor: pointer;
      background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.3); white-space: nowrap;
    }
    .scope-chip.active { background: rgba(255,255,255,0.4); }

    /* ── Card list ──────────────────────────────────── */
    #card-list {
      flex: 1; padding: var(--space-3) var(--space-4);
      display: flex; flex-direction: column; gap: var(--space-2);
      max-width: 800px; width: 100%; margin: 0 auto;
    }

    /* ── Card internals ─────────────────────────────── */
    .card-text { font-size: var(--text-base); line-height: 1.4; flex: 1; }
    .drill-arrow { color: var(--color-neutral-400); margin-left: var(--space-1); flex-shrink: 0; }
    .sign-count { font-size: var(--text-sm); color: var(--color-neutral-400); margin-left: auto; }
    .sign-count.verified { color: var(--color-semantic-500); font-weight: var(--font-weight-bold); }
    .sign-btn {
      background: none; border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius-sm); padding: var(--space-1) var(--space-2);
      cursor: pointer; font-size: var(--text-xs); color: var(--color-neutral-600);
    }
    .sign-btn:hover { border-color: var(--color-interactive-400); color: var(--color-interactive-700); }
    .ts-label { font-size: var(--text-xs); color: var(--color-neutral-300); }

    /* ── Bottom sheet overlay ───────────────────── */
    #bottom-sheet-overlay {
      display: none; position: fixed; inset: 0;
      background: var(--color-surface-overlay); z-index: var(--z-overlay);
    }
    #bottom-sheet-overlay.open { display: flex; align-items: flex-end; }
    #bottom-sheet {
      background: var(--color-surface-card); width: 100%;
      border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      padding: var(--space-6) var(--space-4) calc(var(--space-6) + env(safe-area-inset-bottom, 0px));
      display: flex; flex-direction: column; gap: var(--space-3);
      --bs-color: var(--color-neutral-600);
    }
    #bottom-sheet h3 {
      font-size: var(--text-base); font-weight: var(--font-weight-bold);
      color: var(--color-neutral-900); margin: 0;
    }
    #bs-header { display: flex; align-items: center; justify-content: space-between; }
    #bs-type-chips { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    #bs-textarea { border-color: var(--bs-color) !important; }
    #bs-submit { background: var(--bs-color) !important; }

    /* ── Toast ──────────────────────────────────── */
    #toast-container {
      position: fixed; top: var(--space-4); right: var(--space-4);
      z-index: var(--z-toast); display: flex; flex-direction: column; gap: var(--space-2);
    }
    .app-toast {
      background: var(--color-neutral-900); color: #fff;
      padding: var(--space-3) var(--space-4); border-radius: var(--radius-md);
      box-shadow: var(--shadow-2); font-size: var(--text-sm);
      display: flex; align-items: center; gap: var(--space-2); max-width: 320px;
    }
    .app-toast.success { background: var(--color-semantic-500); }
    .app-toast.error   { background: var(--color-error); }
    .toast-report-btn {
      padding: var(--space-1) var(--space-2); background: rgba(255,255,255,0.2);
      color: #fff; border: 1px solid rgba(255,255,255,0.5); border-radius: var(--radius-sm);
      font-size: var(--text-xs); cursor: pointer; white-space: nowrap; flex-shrink: 0;
    }
    .toast-report-btn:hover { background: rgba(255,255,255,0.35); }

    /* ── Issue panel size override ──────────────── */
    #issue-panel { max-height: 90vh; overflow-y: auto; max-width: min(540px, 95vw); }

    @media (max-width: 600px) {
      #card-list { padding: var(--space-2); }
    }

<script>
// ── State ────────────────────────────────────────────────────────────────────
let tenantId = "";
let sid = "www";
let data = {};          // { "/topic": { "nodeId": { topic, nodeId, message, votes, timestamp } } }
let votesData = {};     // { "/topic/nodeId": { votes: N, signed: N } }
let topicMap = {};      // { "/topic": "DisplayName" }
let selectedTopic = "/";
let latestTimestamp = null;
let notifyCursor = null; // {ts: int, msgid: int} — updated on every 200 response
let searchScope = "below";   // "here" | "below" | "global"
let activeTypes = new Set([".", "!", "!-", "?", "??"]); // visible types

// ── Version ────────────────────────────────────────────────────────────────────
const APP_VERSION = "0.3.0";

// ── Server config (fetched from config.php) ────────────────────────────────────
let serverConfig = {};
fetch('config.php').then(r => r.ok ? r.json() : {}).then(c => { serverConfig = c; }).catch(() => {});

// set true to block entry creation when no topic is selected (root "/")
const REQUIRE_TOPIC_FOR_ENTRY = false;
let typeDisplayMode = "text"; // "text" | "icon+text" | "icon"

// ── Action trail (CA17) ────────────────────────────────────────────────────────
const ACTION_TRAIL_MAX = 10;
let actionTrail = [];

function pushAction(action, detail) {
    actionTrail.push({ ts: new Date().toISOString(), action, detail: detail || "" });
    if (actionTrail.length > ACTION_TRAIL_MAX) actionTrail.shift();
}

function buildStateSnapshot() {
    const searchVal = document.getElementById("search-input").value.trim();
    const cards = document.querySelectorAll("#card-list .card").length;
    return [
        "Thema:  " + selectedTopic,
        "Tenant: [verborgen]",
        "Filter: " + (activeTypes.size ? [...activeTypes].join(", ") : "alle"),
        "Suche:  " + (searchVal ? '"' + searchVal + '" (' + searchScope + ')' : "keine"),
        "Karten: " + cards,
    ].join("\n");
}

function sanitiseForReport(text) {
    let s = String(text);
    if (sid)      s = s.split(sid).join("[sid]");
    if (tenantId) s = s.split(tenantId).join("[tid]");
    return s;
}

// ── Issue report builder (CA17) ────────────────────────────────────────────────
function buildReportText(errorCtx) {
    const lines = [];
    lines.push("=== Issuebericht ===");
    lines.push("Zeit: " + new Date().toISOString() + " | Version: " + APP_VERSION);
    lines.push("");
    lines.push("--- GUI-Test-Befehle ---");
    if (actionTrail.length === 0) {
        lines.push("(keine)");
    } else {
        actionTrail.slice().reverse().forEach(a => {
            lines.push(a.detail ? a.action + '("' + a.detail + '")' : a.action + '()');
        });
    }
    lines.push("");
    lines.push("--- Zustand ---");
    lines.push("```");
    lines.push(buildStateSnapshot());
    lines.push("```");
    if (errorCtx) {
        lines.push("");
        lines.push("--- Fehlerdetails ---");
        if (errorCtx.label)  lines.push("**Fehler:** " + errorCtx.label);
        if (errorCtx.status) lines.push("**Status:** " + errorCtx.status);
        if (errorCtx.url)    lines.push("**URL:** `" + errorCtx.url + "`");
        if (errorCtx.err)    lines.push("**Detail:** " + String(errorCtx.err));
    }
    return sanitiseForReport(lines.join("\n"));
}

function openIssueReport(errorCtx) {
    if (document.getElementById("issue-overlay").classList.contains("open")) return;
    document.getElementById("issue-details").value = buildReportText(errorCtx);
    document.getElementById("issue-user-msg").value = "";
    document.getElementById("issue-titel").value = "";
    document.getElementById("issue-send").disabled = true;
    document.getElementById("issue-overlay").classList.add("open");
}

function closeIssueReport() {
    document.getElementById("issue-overlay").classList.remove("open");
}

document.getElementById("issue-close").addEventListener("click", closeIssueReport);
document.getElementById("issue-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("issue-overlay")) closeIssueReport();
});
document.getElementById("issue-titel").addEventListener("input", () => {
    document.getElementById("issue-send").disabled =
        document.getElementById("issue-titel").value.trim() === "";
});

// ── Issue report submission (CA17) ────────────────────────────────────────────
function buildFullReport() {
    const titel   = document.getElementById("issue-titel").value.trim();
    const userMsg = document.getElementById("issue-user-msg").value.trim();
    const details = document.getElementById("issue-details").value;
    const desc    = userMsg ? "\n\n## Beschreibung\n" + userMsg : "";
    return "# " + titel + "\n\n" + details + desc;
}

function submitReportClipboard() {
    navigator.clipboard.writeText(buildFullReport())
        .then(() => { showToast("Bericht kopiert!", "success", 2000); closeIssueReport(); })
        .catch(() => showToast("Kopieren fehlgeschlagen.", "error"));
}

function submitReportMail() {
    const s = loadSettings();
    if (!s.issueMailto) return;
    const subject = encodeURIComponent("Issuebericht fayf.info " + APP_VERSION);
    const body    = encodeURIComponent(buildFullReport());
    window.open("mailto:" + s.issueMailto + "?subject=" + subject + "&body=" + body);
    closeIssueReport();
}

function submitReportGithub() {
    const s = loadSettings();
    if (!s.issueGithubUrl) return;
    const title = encodeURIComponent("Issuebericht fayf.info " + APP_VERSION);
    const body  = encodeURIComponent(buildFullReport());
    const sep = s.issueGithubUrl.includes("?") ? "&" : "?";
    window.open(s.issueGithubUrl + sep + "title=" + title + "&body=" + body, "_blank");
    closeIssueReport();
}

function submitReportSend() {
    const report = buildFullReport();
    closeIssueReport();
    fetch('issue.php', { method: 'POST', body: new URLSearchParams({ report }) })
        .then(r => r.ok
            ? showToast("Bericht gesendet!", "success", 2000)
            : showToast("Senden fehlgeschlagen.", "error"))
        .catch(() => showToast("Senden fehlgeschlagen.", "error"));
}

document.getElementById("issue-copy").addEventListener("click", submitReportClipboard);
document.getElementById("issue-mail").addEventListener("click", submitReportMail);
document.getElementById("issue-github").addEventListener("click", submitReportGithub);
document.getElementById("issue-send").addEventListener("click", submitReportSend);

// ── Debug ─────────────────────────────────────────────────────────────────────
function runtimeCheck(msg = "") {
    // hook point — intentionally empty; call sites kept for future instrumentation
}

// ── Key helpers ───────────────────────────────────────────────────────────────
function fullKey(topic, nodeId) {
    return topic + ("/" === topic ? "" : "/") + nodeId;
}
function splitKey(key) {
    const lastSlash = key.lastIndexOf("/");
    if (lastSlash <= 0) return ["/", key.replace(/^\//, "")];
    return [key.substring(0, lastSlash), key.substring(lastSlash + 1)];
}

// ── Entry helpers ─────────────────────────────────────────────────────────────
function generateNodeId() {
    return Date.now().toString(36).substring(2) + Math.random().toString(36).substring(2, 8);
}
function getTypeFromMessage(message) {
    for (const t of [">", "!-", "??", "!", "?", ".", "@", "--"]) {
        if (message && message.endsWith(t)) return t;
    }
    return "";
}
function matchType(message, type) {
    const current = getTypeFromMessage(message);
    if (current === type) return message;
    if (!current) return message + type;
    if (type === "--") return message + type;
    return message.slice(0, -current.length).trim() + type;
}
function formatTimestamp(ts) {
    if (!ts) return "";
    const d = new Date(ts.replace(" ", "T"));
    if (isNaN(d)) return ts;
    const now = new Date();
    if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
    if (d.getFullYear() === now.getFullYear()) return d.toLocaleDateString("de-DE", { day: "numeric", month: "short" });
    return d.getFullYear().toString();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(message, type = "info", duration = 3000, errorCtx = null) {
    const container = document.getElementById("toast-container");
    const el = document.createElement("div");
    el.className = "app-toast " + type;
    const span = document.createElement("span");
    span.textContent = message;
    el.appendChild(span);
    if (type === "error" && errorCtx) {
        const btn = document.createElement("button");
        btn.textContent = "Melden";
        btn.className = "toast-report-btn";
        btn.onclick = (e) => { e.stopPropagation(); openIssueReport(errorCtx); };
        el.appendChild(btn);
    }
    container.appendChild(el);
    setTimeout(() => el.remove(), duration);
}

// ── Data write ────────────────────────────────────────────────────────────────
function addEntryWoCheck(topic, nodeId, message, votes, timestamp) {
    runtimeCheck("addEntryWoCheck");
    if (!topic || topic === "") topic = "/";
    if (!data[topic]) data[topic] = {};
    if (message && message.endsWith("--")) {
        delete data[topic][nodeId];
    } else {
        data[topic][nodeId] = { topic, nodeId, timestamp: timestamp || "", message, votes: votes || 0 };
    }
    runtimeCheck("addEntryWoCheck-end");
}
function addEntry(topic, nodeId, message, votes, timestamp) {
    runtimeCheck("addEntry");
    addEntryWoCheck(topic, nodeId, message, votes, timestamp);
    checkData(topic, nodeId, message);
    runtimeCheck("addEntry-end");
}

// ── checkData: ensure topic map consistency ───────────────────────────────────
function checkData(topic, nodeId, message) {
    runtimeCheck("checkData");
    // ensure parent topics exist
    if (topic && topic !== "/") {
        const parts = topic.split("/").filter(Boolean);
        let path = "";
        for (const part of parts) {
            const parentPath = path || "/";
            if (!data[parentPath]) data[parentPath] = {};
            path += "/" + part;
            const found = Object.values(data[parentPath] || {}).some(e => fullKey(e.topic, e.nodeId) === path || e.message.replace(/[.!?@>-]+$/, "") === part);
            if (!found) {
                // create stub topic entry
                const stubId = part;
                data[parentPath][stubId] = { topic: parentPath, nodeId: stubId, message: part + ">", votes: 0, timestamp: "" };
            }
        }
    }
    runtimeCheck("checkData-end");
}

// ── Topic map ─────────────────────────────────────────────────────────────────
function initializeTopicMap() {
    runtimeCheck("initializeTopicMap");
    topicMap = {};
    Object.entries(data).forEach(([topic, nodes]) => {
        Object.values(nodes).forEach(entry => {
            if (entry.message && entry.message.endsWith(">")) {
                const childTopic = fullKey(entry.topic, entry.nodeId);
                topicMap[childTopic] = entry.message.replace(/>$/, "").trim();
            }
        });
    });
    runtimeCheck("initializeTopicMap-end");
}

// ── Merge loaded data ─────────────────────────────────────────────────────────
function addData(dataLoaded) {
    runtimeCheck("addData");
    if (!dataLoaded || Object.keys(dataLoaded).length === 0) return;
    // Backend returns flat { "/path/node": { timestamp, message, attrs, votes } }
    Object.entries(dataLoaded).forEach(([fullPath, entry]) => {
        const [topic, nodeId] = splitKey(fullPath);
        // votes from backend may be an object {sid: n, others: n}; sum to a scalar
        let voteCount = 0;
        if (entry.votes && typeof entry.votes === "object") {
            voteCount = Object.values(entry.votes).reduce((a, b) => a + b, 0);
        } else if (typeof entry.votes === "number") {
            voteCount = entry.votes;
        }
        addEntryWoCheck(topic, nodeId, entry.message, voteCount, entry.timestamp);
        if (/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}$/.test(entry.timestamp)) {
            if (!latestTimestamp || entry.timestamp > latestTimestamp) latestTimestamp = entry.timestamp;
        }
    });
    checkData();
    initializeTopicMap();
    runtimeCheck("addData-end");
}
function addVotesData(dataLoaded) {
    runtimeCheck("addVotesData");
    if (!dataLoaded) return;
    // Backend returns flat { "/path/node": { timestamp, message, attrs, votes } }
    // votes is an object like { sid: n, others: n }; attrs may contain signed count
    Object.entries(dataLoaded).forEach(([key, entry]) => {
        let v = 0;
        if (entry.votes && typeof entry.votes === "object") {
            v = Object.values(entry.votes).reduce((a, b) => a + b, 0);
        } else if (typeof entry.votes === "number") {
            v = entry.votes;
        }
        const s = parseInt((entry.attrs && entry.attrs.signed_count) || 0, 10);
        if (!votesData[key]) votesData[key] = { votes: 0, signed: 0 };
        votesData[key].votes = v;
        votesData[key].signed = s;
        const [topic, nodeId] = splitKey(key);
        if (data[topic] && data[topic][nodeId]) data[topic][nodeId].votes = v;
    });

}

// ── Type system ───────────────────────────────────────────────────────────────
const TYPE_DEFS = {
    "!-": { label: "Fake",       cssClass: "fake",       color: "#f44336", iconClass: "fa-circle-xmark"    },
    "!":  { label: "Fakt",       cssClass: "fakt",       color: "#4CAF50", iconClass: "fa-circle-check"    },
    "??": { label: "Gegenfrage", cssClass: "gegenfrage", color: "#2196F3", iconClass: "fa-right-left"      },
    "?":  { label: "Unklar",     cssClass: "unklar",     color: "#FF9800", iconClass: "fa-circle-question" },
    ".":  { label: "Meinung",    cssClass: "meinung",    color: "#888",    iconClass: "fa-comment"         },
    "@":  { label: "Quelle",     cssClass: "meinung",    color: "#888",    iconClass: "fa-link"            },
    ">":  { label: "Thema",      cssClass: "fakt",       color: "#4CAF50", iconClass: "fa-folder-open"     },
};
const TYPE_DEF_DEFAULT = { label: "Eintrag", cssClass: "meinung", color: "#888", iconClass: "fa-circle-dot" };

function getTypeDef(message) {
    const suffix = getTypeFromMessage(message);
    const base = TYPE_DEFS[suffix] || TYPE_DEF_DEFAULT;
    return { ...base, suffix };
}

function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function getSignedCount(topic, nodeId) {
    const key = fullKey(topic, nodeId);
    return (votesData[key] && votesData[key].signed) || 0;
}

function buildCard(entry) {
    const { topic, nodeId, message, votes, timestamp } = entry;
    const suffix = getTypeFromMessage(message);
    let typeDef = TYPE_DEFS[suffix] || TYPE_DEF_DEFAULT;
    const signed = getSignedCount(topic, nodeId);
    const verified = signed >= 2 && (suffix === "!" || suffix === "!-");
    if (verified) {
        typeDef = suffix === "!"
            ? { label: "Bewiesen ✓", cssClass: "bewiesen", color: "#2e7d32" }
            : { label: "Widerlegung ✓", cssClass: "widerlegung", color: "#b71c1c" };
    }

    const cleanMsg = escapeHtml(message.replace(/[.!?@>\-]+$/, "").trim() || message);
    const voteCount = votes || 0;
    const scoreClass = voteCount > 0 ? "pos" : voteCount < 0 ? "neg" : "zero";
    const scoreStr = voteCount > 0 ? "+" + voteCount : String(voteCount);
    const key = fullKey(topic, nodeId);
    const hasDrillIn = suffix === ">" || (data[key] && Object.keys(data[key]).length > 0);

    const card = document.createElement("div");
    card.className = "card";
    card.dataset.topic = topic;
    card.dataset.nodeId = nodeId;
    card.dataset.fullKey = key;
    card.innerHTML = `
        <div class="card-header">
            <span class="badge badge-${typeDef.cssClass}">${typeDef.label}</span>
            <span class="card-text">${cleanMsg}</span>
            ${hasDrillIn ? '<svg class="icon icon-sm drill-arrow" style="fill:none;stroke:currentColor;stroke-width:1.5"><use href="#icon-arrow-right"/></svg>' : ""}
        </div>
        <div class="card-footer">
            <button class="vote-btn upvote-btn" data-key="${escapeHtml(key)}">▲</button>
            <span class="vote-score ${scoreClass}">${scoreStr}</span>
            <button class="vote-btn downvote-btn" data-key="${escapeHtml(key)}">▼</button>
            <span class="sign-count ${signed >= 2 ? "verified" : ""}">${signed > 0 ? "✓ " + signed : ""}</span>
            <button class="sign-btn" data-key="${escapeHtml(key)}">Bestätigen</button>
            <span class="ts-label">${formatTimestamp(timestamp)}</span>
        </div>
    `;
    return card;
}

function handleVote(key, delta) {
    const [topic, nodeId] = splitKey(key);
    pushAction("vote", key + " " + (delta > 0 ? "+" : "") + delta);
    addVoteByGui(topic, nodeId, delta);
    sendVote(topic, nodeId, delta);

    const card = document.querySelector(`.card[data-full-key="${key}"]`);

    }
}

// ── Swipe voting ──────────────────────────────────────────────────────────────
const _debounceMap = {};
function debounceKey(key, ms) {
    const now = Date.now();
    if (_debounceMap[key] && now - _debounceMap[key] < ms) return false;
    _debounceMap[key] = now;
    return true;
}

// ── Render cards with IntersectionObserver batching ───────────────────────────

function renderCards(entries) {
    runtimeCheck("renderCards");
    const list = document.getElementById("card-list");
    list.innerHTML = "";
    if (!entries || entries.length === 0) {
        list.innerHTML = `<p style="color:#999;text-align:center;padding:2rem">Keine Einträge. Füge den ersten hinzu!</p>`;
        return;
    }
    const BATCH = 80;
    let rendered = 0;
    let observer;

    function renderBatch() {
        const sentinel = document.getElementById("card-sentinel");
        if (sentinel) sentinel.remove();
        const end = Math.min(rendered + BATCH, entries.length);
        for (let i = rendered; i < end; i++) {
            list.appendChild(buildCard(entries[i]));
        }
        rendered = end;
        if (rendered < entries.length) {
            const s = document.createElement("div");
            s.id = "card-sentinel";
            s.style.height = "1px";
            list.appendChild(s);
            observer.observe(s);
        }
        // gesture handling is delegated — no per-card wiring needed
    }

    observer = new IntersectionObserver(entries => {
        if (entries[0].isIntersecting) { observer.disconnect(); renderBatch(); }
    }, { rootMargin: "200px" });

    renderBatch();
    runtimeCheck("renderCards-end");
}

// ── Filtering ─────────────────────────────────────────────────────────────────
function getFilteredEntries() {
    runtimeCheck("getFilteredEntries");
    const searchInput = document.getElementById("search-input");
    const searchVal = searchInput ? searchInput.value.trim().toLowerCase() : "";
    const result = [];
    Object.entries(data).forEach(([topic, nodes]) => {
        // scope filter
        if (searchScope === "here" && topic !== selectedTopic) return;
        if (searchScope === "below" && topic !== selectedTopic && !topic.startsWith(selectedTopic === "/" ? "/" : selectedTopic + "/")) return;
        // for non-search: only show direct children of selectedTopic (skip for global scope)
        if (!searchVal && searchScope !== "global" && topic !== selectedTopic) return;

        Object.values(nodes).forEach(entry => {
            const suffix = getTypeFromMessage(entry.message);
            if (!activeTypes.has(suffix) && suffix !== ">") return;
            if (searchVal && !entry.message.toLowerCase().includes(searchVal)) return;
            result.push(entry);
        });
    });
    result.sort((a, b) => (b.votes || 0) - (a.votes || 0) || a.message.localeCompare(b.message));
    runtimeCheck("getFilteredEntries-end");
    return result;
}

let pollActive = false;
let pollController = null;
let pollGeneration = 0;

function buildEntriesUrl(extra = {}) {
    const p = new URLSearchParams({ sid, tid: tenantId, format: "json", ...extra });
    return "entries?" + p.toString();
}
function buildVotesUrl(extra = {}) {

async function safeJson(res, label) {
    const text = await res.text();
    if (!text.trim()) return null;
    try {
        return JSON.parse(text);
    } catch (err) {
        console.error("[app2] " + label + " JSON parse error:", err.message,
            "\n  status:", res.status, res.url,
            "\n  body:", text.slice(0, 500));
        throw new Error(label + ": ungültiges JSON (Status " + res.status + ") — Details in der Konsole");
    }
}

async function loadInitialData() {
    if (!tenantId) { showToast("Kein Tenant gesetzt — öffne Einstellungen.", "error"); return; }
    runtimeCheck("loadInitialData");
    try {
        const [eRes, vRes] = await Promise.all([
            fetch(buildEntriesUrl()),
            fetch(buildVotesUrl()),
        ]);
        let loadError = false;
        if (eRes.ok) addData(await safeJson(eRes, "entries"));
        else { console.warn("[app2] entries fetch", eRes.status, eRes.url); loadError = true; }
        if (vRes.ok) addVotesData(await safeJson(vRes, "votes"));
        else { console.warn("[app2] votes fetch", vRes.status, vRes.url); loadError = true; }
        updateView();
        if (!loadError) showToast("Daten geladen.", "success", 1500);
    } catch (err) {

    if (res.ok) addVotesData(await res.json());
}

async function startNotifyPoll() {
    pollActive = true;
    const gen = ++pollGeneration;
    async function poll() {
        if (gen !== pollGeneration) return;
        if (!pollActive || document.hidden) { setTimeout(poll, 2000); return; }
        try {
            pollController = new AbortController();
            const params = { sid, tid: tenantId };
            if (notifyCursor) {
                params.ts    = notifyCursor.ts;
                params.msgid = notifyCursor.msgid;
            }
            const res = await fetch(
                'notify?' + new URLSearchParams(params),
                { signal: pollController.signal }
            );
            if (res.status === 200) {
                const body = await res.json();
                notifyCursor = { ts: body.ts, msgid: body.msgid };
                if (body.entries)  { addData(body.entries); updateView(); }
                if (body.votes)    { await loadVotes(); updateView(); }
                if (body.message)  { for (const m of body.message) showToast(m.text, 'info'); }
            } else if (res.status === 400) {
                const err = await res.json().catch(() => ({}));
                if ((err?.error?.code) === 'STALE_CURSOR') {
                    notifyCursor = null;
                    await loadInitialData();
                    updateView();
                }
            }
            // 204: backend already held poll_timeout — reconnect immediately
        } catch (err) {
            if (err.name !== 'AbortError') await new Promise(r => setTimeout(r, 5000));
        }
        poll();
    }
    poll();
}

function stopLongPoll() {
    pollActive = false;
    if (pollController) { pollController.abort(); pollController = null; }
}

// Pause poll when tab hidden
document.addEventListener("visibilitychange", () => {
    if (document.hidden) stopLongPoll();
    else if (tenantId) startNotifyPoll();
});

    }
});

async function submitEntry() {
    const text = document.getElementById("bs-textarea").value.trim();

    const message = matchType(text, bsSelectedType);

    const nodeId   = isEdit ? _bsEditEntry.nodeId  : generateNodeId();
    const topic    = isEdit ? _bsEditEntry.topic   : selectedTopic;
    const fullPath = topic === "/" ? "/" + nodeId : topic + "/" + nodeId;
    const body = new URLSearchParams({ entry: `${fullPath} | ${message}` });
    try {
        const res = await fetch("entries?" + new URLSearchParams({ sid, tid: tenantId }), { method: "POST", body });
        if (res.ok) {
            const json = await res.json();
            pushAction(isEdit ? "editEntry" : "addEntry", fullPath);

            updateView();
            showToast(isEdit ? "Eintrag aktualisiert!" : "Eintrag hinzugefügt!", "success");
            closeBottomSheet();
        } else {
            showToast("Eintrag konnte nicht gespeichert werden.", "error", 3000, { label: "submitEntry", status: res.status, url: res.url });
        }
    } catch (err) {
        console.error("[app2] submitEntry:", err);
        showToast("Verbindung unterbrochen. Bitte erneut versuchen.", "error", 3000, { label: "submitEntry", err });
    }
}

// wire FAB and sheet buttons
document.getElementById("fab").addEventListener("click", () => openBottomSheet());
document.getElementById("bs-cancel").addEventListener("click", closeBottomSheet);
document.getElementById("bs-close").addEventListener("click", closeBottomSheet);
document.getElementById("bs-submit").addEventListener("click", submitEntry);
document.getElementById("bottom-sheet-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("bottom-sheet-overlay")) closeBottomSheet();
});

// type chips in sheet
document.getElementById("bs-type-chips").addEventListener("click", e => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    bsSelectedType = chip.dataset.type;
    document.querySelectorAll("#bs-type-chips .chip").forEach(c => c.classList.toggle("active", c === chip));
    updateBsColor(bsSelectedType);
});

// ── Search ────────────────────────────────────────────────────────────────────
document.getElementById("nav-search-icon").addEventListener("click", () => {
    const bar = document.getElementById("nav-search-bar");
    bar.classList.toggle("open");
    if (bar.classList.contains("open")) document.getElementById("search-input").focus();
    else { document.getElementById("search-input").value = ""; updateView(); }
});

document.getElementById("search-input").addEventListener("input", () => {
    const val = document.getElementById("search-input").value.trim();
    if (val) pushAction("search", '"' + val + '"');
    updateView();
});

document.getElementById("nav-search-bar").addEventListener("click", e => {
    const chip = e.target.closest(".scope-chip");
    if (!chip) return;
    searchScope = chip.dataset.scope;
    pushAction("searchScope", searchScope);
    document.querySelectorAll(".scope-chip").forEach(c => c.classList.toggle("active", c === chip));
    updateView();
});

// ── Settings ──────────────────────────────────────────────────────────────────
function openSettings() {
    const s = loadSettings();
    document.getElementById("settings-tenant").value     = tenantId;
document.getElementById("settings-type-display").value = typeDisplayMode;
    document.getElementById("settings-overlay").classList.add("open");
    fetch("version.json").then(r => r.ok ? r.json() : null).then(v => {
        const el = document.getElementById("settings-version");
        el.textContent = v ? `${v.branch} · ${v.sha.slice(0,7)} · ${v.time}` : "";
    }).catch(() => {});
}
function closeSettings() {
    document.getElementById("settings-overlay").classList.remove("open");
}
function applySettings() {
    const newTenant = document.getElementById("settings-tenant").value.trim().replace(/[^a-zA-Z0-9_-]/g, "").substring(0, 30);
    if (newTenant && newTenant !== tenantId) {
        pushAction("loadTenant", "[tid]");
        tenantId = newTenant;
        saveSettings({ tenantId });
        stopLongPoll();
        data = {}; votesData = {}; topicMap = {}; latestTimestamp = null; notifyCursor = null; selectedTopic = "/";
        updateView();
        loadInitialData().then(() => startNotifyPoll());
        // update URL
        const url = new URL(window.location.href);
        url.searchParams.set("tid", tenantId);
        history.pushState({}, "", url);
    }
const newDisplayMode = document.getElementById("settings-type-display").value;
    if (newDisplayMode !== typeDisplayMode) {
        typeDisplayMode = newDisplayMode;
        saveSettings({ typeDisplayMode: newDisplayMode });
        updateTypeDisplay();
    }
    closeSettings();
}

document.getElementById("nav-settings-icon").addEventListener("click", openSettings);
document.getElementById("settings-close").addEventListener("click", closeSettings);
document.getElementById("settings-apply").addEventListener("click", applySettings);
document.getElementById("settings-overlay").addEventListener("click", e => {
    if (e.target === document.getElementById("settings-overlay")) closeSettings();
});
document.getElementById("settings-bug-report").addEventListener("click", () => {
    closeSettings();
    openIssueReport(null);
});

// ── Bootstrap ─────────────────────────────────────────────────────────────────
(function init() {
    const params = new URLSearchParams(window.location.search);
    const initSettings = loadSettings();
    tenantId = params.get("tid") || params.get("tenantId") || initSettings.tenantId || "";
    sid = initSettings.sid || "www";
    const topicParam = params.get("topic");
    if (topicParam) selectedTopic = topicParam;
    document.getElementById("settings-tenant").value = tenantId;
    typeDisplayMode = initSettings.typeDisplayMode || "text";
    updateTypeDisplay();
    if (tenantId) {
        loadInitialData().then(() => startNotifyPoll());
    }
})();
</script>
